coverage:
  status:
    patch:
      default:
        target: auto
        informational: true
    project:
      default:
        target: 90%
        threshold: 1%
        flags:
          - tests
flags:
  tests:
    paths:
      - src/
    carryforward: true
  gpu:
    paths:
      - src/
    carryforward: true
codecov:
  notify:
    # 6 = test.yml: 3 (optional+ubuntu) + 2 (upstream + min_deps), hypothesis: 1
    after_n_builds: 6
    wait_for_ci: yes
comment:
  layout: "diff, files"
  behavior: default
  require_changes: true  # if true: only post the comment if coverage changes
  branches:               # branch names that can post comment
    - "main"
github_checks:
  annotations: false
