name: zarr-indexing

on:
  push:
    branches: [main]
    paths:
      - 'packages/zarr-indexing/**'
      - '.github/workflows/zarr-indexing.yml'
  pull_request:
    paths:
      - 'packages/zarr-indexing/**'
      - '.github/workflows/zarr-indexing.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest py=${{ matrix.python-version }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      # The transform tests exercise chunk resolution against zarr's ChunkGrid,
      # so they run from the repo root against the full workspace (which installs
      # both `zarr` and the `zarr-indexing` workspace member) rather than in
      # package isolation.
      - name: Sync test dependency group
        run: uv sync --group test --python ${{ matrix.python-version }}
      - name: Run pytest
        run: uv run --group test pytest packages/zarr-indexing/tests

  ruff:
    name: ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: packages/zarr-indexing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Run ruff
        run: uvx ruff check .

  pyright:
    name: pyright
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: packages/zarr-indexing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync test dependency group
        run: uv sync --group test --python 3.12
      - name: Run pyright
        run: uv run --group test --with pyright pyright src

  zarr-indexing-complete:
    name: zarr-indexing complete
    needs: [test, ruff, pyright]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check failure
        if: |
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: Success
        run: echo Success!
