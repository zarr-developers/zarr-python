name: Test on Pyodide/WASM

on:
  push:
    branches: [main, 3.1.x]
  pull_request:
    branches: [main, 3.1.x]
  workflow_dispatch:

env:
  FORCE_COLOR: 3

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test-emscripten:
    name: os=emscripten, py=${{ matrix.python-version }}, deps=minimal
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]
    steps:
      - name: Checkout Zarr repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install pyodide-build
        run: python -m pip install pyodide-build

        # TODO: Update to a stable Pyodide version when we release it
      - name: Install Pyodide xbuildenv
        run: pyodide xbuildenv install 314.0.0a2

      - name: Build Zarr wheel
        run: pipx run build

      - name: Run Zarr tests for Pyodide
        run: |
          # Set up Pyodide virtual environment and activate it
          pyodide venv .venv-pyodide
          source .venv-pyodide/bin/activate

          # Install Zarr wheel and test dependencies
          pip install dist/*.whl
          pip install --group test

          # Run tests
          python -m pytest tests -svra
