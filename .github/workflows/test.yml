# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Test

on:
  push:
    branches: [ main, 3.1.x ]
  pull_request:
    branches: [ main, 3.1.x ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: os=${{ matrix.os }}, py=${{ matrix.python-version }}, deps=${{ matrix.dependency-set }}
    environment:
      name: codecov-upload
      deployment: false
    defaults:
      run:
        shell: bash

    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']
        dependency-set: ["minimal", "optional"]
        os: ["ubuntu-latest"]
        include:
          - python-version: '3.12'
            dependency-set: 'optional'
            os: 'macos-latest'

          - python-version: '3.14'
            dependency-set: 'optional'
            os: 'macos-latest'

          - python-version: '3.12'
            dependency-set: 'optional'
            os: 'windows-latest'

          - python-version: '3.14'
            dependency-set: 'optional'
            os: 'windows-latest'
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0  # grab all branches and tags
        persist-credentials: false
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}
    # One universal uv.lock serves every os/python cell of this matrix;
    # `uv sync --locked` fails if it is stale vs pyproject.toml — a
    # cross-platform drift gate. setup-uv's python-version sets UV_PYTHON, so uv
    # selects the right interpreter. The shared coverage runner lives in
    # ci/run-coverage.sh so CI and local dev invoke an identical command.
    - name: Run Tests
      env:
        HYPOTHESIS_PROFILE: ci
      run: |
        EXTRAS=""
        if [ "${{ matrix.dependency-set }}" = "optional" ]; then
          EXTRAS="--extra remote --extra optional --extra cli --extra cast-value-rs --group remote-tests"
        fi
        uv sync --locked --no-default-groups --group test $EXTRAS
        bash ci/run-coverage.sh
    - name: Upload coverage
      if: ${{ matrix.dependency-set == 'optional' && matrix.os == 'ubuntu-latest' }}
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        flags: tests
        verbose: true # optional (default = false)

  test-upstream-and-min-deps:
    name: py=${{ matrix.python-version }}-${{ matrix.dependency-set }}
    environment:
      name: codecov-upload
      deployment: false
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', "3.14"]
        dependency-set: ["upstream", "min_deps"]
        exclude:
          - python-version: "3.14"
            dependency-set: min_deps
          - python-version: "3.12"
            dependency-set: upstream
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}
    # Both intentionally unlocked: min_deps derives floors via uv's --resolution
    # lowest-direct (replacing the hand-pinned tool.hatch.envs.min_deps);
    # upstream overlays nightly + git mains (ci/sync-upstream.sh).
    - name: Run Tests
      run: |
        if [ "${{ matrix.dependency-set }}" = "min_deps" ]; then
          uv sync --resolution lowest-direct --no-default-groups --group test --group remote-tests --extra remote --extra optional
        else
          bash ci/sync-upstream.sh
        fi
        bash ci/run-coverage.sh
    - name: Upload coverage
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        flags: tests
        verbose: true # optional (default = false)

  doctests:
    name: doctests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0 # required for hatch version discovery, which is needed for numcodecs.zarr3
        persist-credentials: false
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: true
        python-version: '3.13'
    - name: Run doctests
      run: |
        uv sync --locked --no-default-groups --extra remote --group remote-tests
        uv pip list
        uv run --no-sync --with pytest-examples pytest tests/test_docs.py -v

  benchmarks:
    name: Benchmark smoke test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: true
        python-version: '3.13'
    - name: Run Benchmarks
      run: |
        uv sync --locked --no-default-groups --group test
        uv run --no-sync pytest --benchmark-enable tests/benchmarks

  test-complete:
    name: Test complete

    needs:
      [
        test,
        test-upstream-and-min-deps,
        doctests,
        benchmarks
      ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check failure
        if: |
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: Success
        run: echo Success!
