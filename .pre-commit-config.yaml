ci:
  autoupdate_commit_msg: "chore: update pre-commit hooks"
  autoupdate_schedule: "monthly"
  autofix_prs: false
  skip: []  # pre-commit.ci only checks for updates, prek runs hooks locally

default_stages: [pre-commit, pre-push]

default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-check
        args: ["--fix", "--show-fixes"]
      - id: ruff-format
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args: ["-L", "fo,ihs,kake,te", "-S", "fixture"]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        exclude: mkdocs.yml
      - id: trailing-whitespace
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        files: src|tests
        additional_dependencies:
          # Package dependencies
          - packaging
          - donfig
          - numcodecs
          - google-crc32c>=1.5
          - numpy==2.1 # https://github.com/zarr-developers/zarr-python/issues/3780 + https://github.com/zarr-developers/zarr-python/issues/3688
          - typing_extensions
          - universal-pathlib
          - obstore>=0.5.1
          # Tests
          - pytest
          - hypothesis
          - s3fs
  - repo: https://github.com/scientific-python/cookie
    rev: 2026.04.04
    hooks:
      - id: sp-repo-review
  - repo: https://github.com/numpy/numpydoc
    rev: v1.10.0
    hooks:
      - id: numpydoc-validation
  - repo: local
    hooks:
      - id: ban-lstrip-rstrip
        name: ban lstrip/rstrip
        language: pygrep
        # Matches .lstrip() or .rstrip() where the string argument is 2+ characters.
        entry: "\\.(lstrip|rstrip)\\([\"'][^\"']{2,}[\"']\\)"
        types: [python]
        files: ^(src|tests)/
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.23.1
    hooks:
      - id: zizmor
  - repo: https://github.com/twisted/towncrier
    rev: 25.8.0
    hooks:
      - id: towncrier-check
